name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version   # 4.0.5, matches local rbenv
          bundler-cache: true            # bundle install + cache gems
      - name: Run the automated test suite
        run: bundle exec rake test
